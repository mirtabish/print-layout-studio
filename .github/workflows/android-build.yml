steps:
  - uses: actions/checkout@v4

  - name: Set up JDK 17
    uses: actions/setup-java@v4
    with:
      java-version: '17'
      distribution: 'temurin'
      cache: gradle

  - name: Download Clean Gradle Wrapper JAR
    run: |
      mkdir -p gradle/wrapper
      curl -Lo gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar

  - name: Make Gradle Wrapper Executable
    run: chmod +x ./gradlew

  - name: Build Debug APK
    run: ./gradlew assembleDebug
