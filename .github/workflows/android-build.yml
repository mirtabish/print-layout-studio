name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4 # Upgraded to v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # Upgraded to v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradle
        run: chmod +x gradlew
        working-directory: ./YOUR_SUBFOLDER_NAME # 👈 Change to your subfolder name

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        working-directory: ./YOUR_SUBFOLDER_NAME # 👈 Change to your subfolder name

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2 # Upgraded to v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          # 👇 Make sure this path also reflects your subfolder if needed
          files: YOUR_SUBFOLDER_NAME/app/build/outputs/apk/debug/app-debug.apk 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
