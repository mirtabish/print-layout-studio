name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1'

      - name: Setup Debug Keystore
        run: |
          mkdir -p ~/.android
          if [ -f "debug.keystore.base64" ]; then
            base64 -d debug.keystore.base64 > ~/.android/debug.keystore
          elif [ -f "debug.keystore" ]; then
            cp debug.keystore ~/.android/debug.keystore
          else
            keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Copy APK to repository apk directory
        if: success()
        run: |
          mkdir -p apk
          cp app/build/outputs/apk/debug/app-debug.apk apk/app-debug.apk

      - name: Commit and push updated APK
        if: success() && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apk/app-debug.apk
          git commit -m "build(apk): update app-debug.apk [skip ci]" || echo "No changes to commit"
          git push

      - name: Create or Update GitHub Release
        if: success() && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.3
          name: "Print Layout Studio v1.3"
          body: "Official release build of Print Layout Studio with live in-app OTA update support."
          files: apk/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
